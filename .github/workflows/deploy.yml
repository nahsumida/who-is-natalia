name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # Para repositório de projeto (ex: usuario.github.io/meu-repo),
          # o GitHub Pages serve em subpath. Ajuste se necessário.
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Prepare static output
        run: |
          # TanStack Start emite assets em .output/public.
          # Copiamos para uma pasta dist/ e adicionamos fallback SPA + .nojekyll
          mkdir -p dist
          if [ -d ".output/public" ]; then
            cp -r .output/public/. dist/
          elif [ -d "dist" ]; then
            echo "dist already exists"
          else
            echo "Build output not found"
            exit 1
          fi
          # Fallback para roteamento client-side (SPA)
          if [ -f "dist/index.html" ]; then
            cp dist/index.html dist/404.html
          fi
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
